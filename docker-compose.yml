services:
  app:
    build: .
    container_name: phishing-guard
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app                          # Hot-reload during development
      - uploads_data:/app/uploads       # Persist attachment files
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  redis:
    image: redis:7-alpine
    container_name: phishing-guard-redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    container_name: phishing-guard-db
    environment:
      POSTGRES_USER: phishing_user
      POSTGRES_PASSWORD: phishing_pass
      POSTGRES_DB: phishing_guard
    ports:
      - "5433:5432"                     # Use 5433 to avoid conflict with local PG
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phishing_user -d phishing_guard"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  uploads_data:
